spring:
  application:
    name: ye-ai-code-gen-platform
  devtools:
    restart:
      enabled: false
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_code_gen_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  profiles:
    active: local

server:
  port: 8531
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yuri.yeaicodegenplatform.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn