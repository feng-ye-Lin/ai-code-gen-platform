spring:
  application:
    name: ye-ai-code-gen-platform
server:
  port: 8531
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yuri.yeaicodegenplatform.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

